<html lang="ko"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KMAMA POST Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&amp;family=Noto+Sans+JP:wght@300;400;500;700&amp;family=Space+Mono:wght@400;700&amp;display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{--bg:#0f0f11;--surface:#18181c;--surface2:#222228;--border:#2e2e38;--accent:#00e5b0;--accent2:#7c6ff7;--text:#f0f0f0;--text2:#999;--text3:#555;--danger:#ff4d6d;--radius:12px;--radius-sm:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.header{padding:20px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Space Mono',monospace;font-size:15px;color:var(--accent);letter-spacing:1px}
.logo span{color:var(--text2)}
.container{max-width:1200px;margin:0 auto;padding:32px 24px}
.step-wrap{display:flex;flex-direction:column;gap:16px;margin-bottom:40px}
.step{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;transition:border-color .2s}
.step.active{border-color:var(--accent)}
.step-header{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.step-num{width:28px;height:28px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:12px;color:var(--text2);flex-shrink:0}
.step.active .step-num{background:var(--accent);border-color:var(--accent);color:#000}
.step-title{font-size:14px;font-weight:500}
.step-sub{font-size:12px;color:var(--text2);margin-left:auto}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.field label{font-size:11px;color:var(--text2);letter-spacing:.5px;text-transform:uppercase}
.field input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s;width:100%}
.field input:focus{border-color:var(--accent)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:'Noto Sans KR',sans-serif}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{filter:brightness(1.1)}
.btn-secondary{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-secondary:hover{border-color:var(--text2);color:var(--text)}
.btn-sm{padding:7px 14px;font-size:12px}
.status-bar{display:flex;align-items:center;gap:8px;font-size:12px;padding:8px 12px;border-radius:var(--radius-sm);margin-top:12px}
.status-bar.info{background:#1a2a2a;color:var(--accent);border:1px solid #1a4a3a}
.status-bar.error{background:#2a1a1a;color:var(--danger);border:1px solid #4a1a2a}
.status-bar.success{background:#1a2a1a;color:#4caf50;border:1px solid #1a4a2a}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 1.2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.progress-steps{display:flex;gap:8px;margin-bottom:20px}
.prog-step{flex:1;height:3px;background:var(--border);border-radius:2px;transition:background .3s}
.prog-step.done{background:var(--accent)}
.prog-step.active{background:var(--accent2)}
.preview-section{margin-top:32px}
.preview-header{display:flex;align-items:center;margin-bottom:16px}
.preview-title{font-size:14px;font-weight:500}
.cards-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;margin-bottom:24px}
.card-wrap{position:relative}
.cut-label{font-family:'Space Mono',monospace;font-size:11px;color:var(--text3);margin-bottom:8px}
.post-card{background:#fff;border-radius:16px;padding:20px;min-height:480px;display:flex;flex-direction:column;color:#111;font-family:'Noto Sans KR',sans-serif}
.post-card.jp{font-family:'Noto Sans JP',sans-serif}
.card-handle{font-size:11px;font-weight:700;text-align:center;color:#555;margin-bottom:14px}
.card-ttl-bold{font-size:15px;font-weight:700;color:#111;margin-bottom:14px;line-height:1.45}
.card-ttl-normal{font-size:14px;color:#111;margin-bottom:14px;line-height:1.45}
.card-meta{display:flex;align-items:center;gap:10px;padding-bottom:12px;border-bottom:1px solid #eee;margin-bottom:12px}
.card-avatar{width:36px;height:36px;border-radius:50%;background:#e8f8f4;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.card-meta-name{font-size:13px;font-weight:600;color:#222}
.card-meta-sub{font-size:11px;color:#888;margin-top:1px}
.card-body{font-size:13px;line-height:1.85;color:#222;flex:1;white-space:pre-wrap}
.best-wrap{margin-top:14px;padding:10px 13px;background:#f0faf6;border-left:3px solid #00c896}
.best-lbl{font-size:10px;color:#00a070;font-weight:700;margin-bottom:5px}
.best-txt{font-size:12px;color:#1a5a40;line-height:1.65}
.tweets-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:24px}
.tweets-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}
.tweet-box{background:var(--surface2);border-radius:var(--radius-sm);padding:14px}
.tweet-box-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;font-family:'Space Mono',monospace}
.tweet-item{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px}
.tweet-style{font-size:10px;color:var(--text3);margin-bottom:5px}
.tweet-text{font-size:12px;color:var(--text);line-height:1.65}
.tweet-copy{display:flex;justify-content:flex-end;margin-top:6px}
.copy-btn{font-size:11px;color:var(--text2);background:none;border:none;cursor:pointer;font-family:'Space Mono',monospace;transition:color .15s}
.copy-btn:hover{color:var(--accent)}
.action-bar{display:flex;gap:10px;flex-wrap:wrap;padding:20px 24px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
#koCardsEl,#jpCardsEl{display:grid;grid-template-columns:repeat(3,360px);gap:16px;padding:24px;background:#f5f5f0;position:absolute;left:-9999px;top:0}
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.loading-overlay.show{display:flex}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-msg{font-size:14px;color:var(--text2)}
@media(max-width:768px){.cards-grid,.tweets-grid,.field-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-msg" id="loadingMsg">矛虏聵毛娄卢 矛陇聭...</div>
</div>
<header class="header">
  <div class="logo">KMAMA<span>/</span>POST</div>
  <div style="font-size:11px;color:var(--text3);font-family:'Space Mono',monospace">茅聼聯氓聸陆茫聜鲁茫聝聼茫聝楼茫聝聥茫聝聠茫聜拢 芒聠聮 X猫聡陋氓聥聲氓聦聳</div>
</header>
<div class="container">
  <div class="step-wrap">
    <div class="step active" id="step1">
      <div class="step-header">
        <div class="step-num">1</div>
        <div class="step-title">API 铆聜陇 &amp; 毛搂聢毛炉赂铆聠隆 锚鲁聞矛&nbsp;聲 矛聞陇矛&nbsp;聲</div>
        <div class="step-sub">矛碌聹矛麓聢 1铆職聦毛搂聦 矛聻聟毛&nbsp;楼</div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Google AI Studio API Key</label>
          <input type="password" id="geminiKey" placeholder="AIza...">
        </div>
        <div class="field">
          <label>毛搂聢毛炉赂铆聠隆 矛&nbsp;聞铆聶聰毛虏聢铆聵赂</label>
          <input type="tel" id="mmPhone" placeholder="01012345678">
        </div>
      </div>
      <div class="field">
        <label>毛搂聢毛炉赂铆聠隆 毛鹿聞毛掳聙毛虏聢铆聵赂</label>
        <input type="password" id="mmPw" placeholder="毛搂聢毛炉赂铆聠隆 毛鹿聞毛掳聙毛虏聢铆聵赂">
      </div>
      <div style="display:flex;gap:10px;margin-top:4px">
        <button class="btn btn-primary" onclick="saveSettings()">矛&nbsp;聙矛聻楼 &amp; 毛搂聢毛炉赂铆聠隆 毛隆聹锚路赂矛聺赂</button>
        <button class="btn btn-secondary btn-sm" onclick="loadSettings()">矛&nbsp;聙矛聻楼毛聬聹 矛聞陇矛&nbsp;聲 毛露聢毛聼卢矛聵陇锚赂掳</button>
      </div>
      <div id="settingsStatus"></div>
    </div>
    <div class="step" id="step2">
      <div class="step-header">
        <div class="step-num">2</div>
        <div class="step-title">锚虏聦矛聥聹锚赂聙 URL 矛聻聟毛&nbsp;楼</div>
      </div>
      <div class="field">
        <label>毛搂聢毛炉赂铆聠隆 锚鲁碌矛聹&nbsp; 毛搂聛铆聛卢 毛聵聬毛聤聰 矛搂聛矛&nbsp;聭 URL</label>
        <input type="text" id="postUrl" placeholder="mommytalk.onelink.me/... 毛聵聬毛聤聰 community.mmtalk.kr/community/article/..." oninput="autoParseUrl(this)">
        <div id="parsedUrlInfo" style="font-size:11px;color:var(--accent);margin-top:4px;display:none"></div>
      </div>
      <button class="btn btn-primary" onclick="runFull()">毛露聞矛聞聺 &amp; 矛聝聺矛聞卤 矛聥聹矛聻聭 芒聠聮</button>
      <div id="analyzeStatus"></div>
    </div>
  </div>
  <div class="preview-section" id="previewSection" style="display:none">
    <div class="progress-steps">
      <div class="prog-step" id="prog1"></div>
      <div class="prog-step" id="prog2"></div>
      <div class="prog-step" id="prog3"></div>
      <div class="prog-step" id="prog4"></div>
    </div>
    <div class="preview-header">
      <span style="font-size:18px;margin-right:10px">冒聼聡掳冒聼聡路</span>
      <span class="preview-title">铆聲聹锚碌颅矛聳麓 矛聸聬毛鲁赂</span>
    </div>
    <div class="cards-grid" id="koPreview"></div>
    <div style="height:1px;background:var(--border);margin:28px 0"></div>
    <div class="preview-header">
      <span style="font-size:18px;margin-right:10px">冒聼聡炉冒聼聡碌</span>
      <span class="preview-title">矛聺录毛鲁赂矛聳麓 毛虏聢矛聴颅毛鲁赂</span>
    </div>
    <div class="cards-grid" id="jpPreview"></div>
    <div style="height:1px;background:var(--border);margin:28px 0"></div>
    <div class="tweets-section">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:16px">冒聺聲聫</span>
        <span class="preview-title">铆聫卢矛聤陇铆聦聟 矛露聰矛虏聹 毛卢赂锚碌卢</span>
      </div>
      <div class="tweets-grid" id="tweetsGrid"></div>
    </div>
    <div class="action-bar">
      <button class="btn btn-primary" onclick="downloadCards('ko')">冒聼聡掳冒聼聡路 铆聲聹锚碌颅矛聳麓 矛鹿麓毛聯聹 PNG</button>
      <button class="btn btn-primary" onclick="downloadCards('jp')">冒聼聡炉冒聼聡碌 矛聺录毛鲁赂矛聳麓 矛鹿麓毛聯聹 PNG</button>
      <button class="btn btn-secondary" onclick="runFull()">芒聠潞 矛聝聢 锚虏聦矛聥聹锚赂聙 毛露聞矛聞聺</button>
    </div>
    <div id="dlStatus" style="font-size:12px;color:var(--text2);margin-top:8px;padding:0 4px"></div>
  </div>
</div>
<div id="koCardsEl"></div>
<div id="jpCardsEl"></div>
<script id="appScript">
var GQL = 'https://api.mmtalk.kr/graphql';
var PROXY1 = 'https://corsproxy.io/?url=';
var PROXY2 = 'https://api.allorigins.win/raw?url=';
var mmToken = null;
var geminiKey = '';

function saveSettings() {
  geminiKey = document.getElementById('geminiKey').value.trim();
  var phone = document.getElementById('mmPhone').value.trim();
  var pw = document.getElementById('mmPw').value.trim();
  if (!geminiKey) { showStatus('settingsStatus', 'Google AI Studio API 铆聜陇毛楼录 矛聻聟毛聽楼铆聲麓矛拢录矛聞赂矛職聰', 'error'); return; }
  if (!phone || !pw) { showStatus('settingsStatus', '毛搂聢毛炉赂铆聠隆 矛聽聞铆聶聰毛虏聢铆聵赂矛聶聙 毛鹿聞毛掳聙毛虏聢铆聵赂毛楼录 矛聻聟毛聽楼铆聲麓矛拢录矛聞赂矛職聰', 'error'); return; }
  localStorage.setItem('kmama_gemini', geminiKey);
  localStorage.setItem('kmama_phone', phone);
  doLogin(phone, pw);
}

function loadSettings() {
  var k = localStorage.getItem('kmama_gemini');
  var p = localStorage.getItem('kmama_phone');
  if (k) { document.getElementById('geminiKey').value = k; geminiKey = k; }
  if (p) { document.getElementById('mmPhone').value = p; }
  showStatus('settingsStatus', k ? '矛聽聙矛聻楼毛聬聹 矛聞陇矛聽聲矛聺聞 毛露聢毛聼卢矛聶聰矛聤碌毛聥聢毛聥陇. 毛鹿聞毛掳聙毛虏聢铆聵赂 矛聻聟毛聽楼 铆聸聞 毛隆聹锚路赂矛聺赂铆聲麓矛拢录矛聞赂矛職聰.' : '矛聽聙矛聻楼毛聬聹 矛聞陇矛聽聲矛聺麓 矛聴聠矛聤碌毛聥聢毛聥陇', k ? 'info' : 'error');
}

function doLogin(phone, pw) {
  showStatus('settingsStatus', '毛搂聢毛炉赂铆聠隆 毛隆聹锚路赂矛聺赂 矛陇聭...', 'info', true);
  fetch(GQL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      operationName: 'Login',
      query: 'mutation Login($loginInput:UserLoginInput!){login(loginInput:$loginInput){accessToken status message}}',
      variables: { loginInput: { phoneNumber: phone, password: pw } }
    })
  }).then(function(r) { return r.json(); }).then(function(data) {
    var result = data && data.data && data.data.login;
    if (result && result.accessToken) {
      mmToken = result.accessToken;
      showStatus('settingsStatus', '芒聹聯 毛搂聢毛炉赂铆聠隆 毛隆聹锚路赂矛聺赂 矛聞卤锚鲁碌! URL矛聺聞 矛聻聟毛聽楼铆聲聵矛聞赂矛職聰', 'success');
      document.getElementById('step2').classList.add('active');
    } else {
      showStatus('settingsStatus', '芒聹聴 毛隆聹锚路赂矛聺赂 矛聥陇铆聦篓: ' + ((result && result.message) || '锚鲁聞矛聽聲 矛聽聲毛鲁麓毛楼录 铆聶聲矛聺赂铆聲麓矛拢录矛聞赂矛職聰'), 'error');
    }
  }).catch(function(e) {
    showStatus('settingsStatus', '芒聹聴 矛聵陇毛楼聵: ' + e.message, 'error');
  });
}

function autoParseUrl(input) {
  var val = input.value.trim();
  var info = document.getElementById('parsedUrlInfo');
  if (!val) { info.style.display = 'none'; return; }
  if (val.indexOf('onelink.me') !== -1 || val.indexOf('af_android_url') !== -1 || val.indexOf('af_ios_url') !== -1) {
    var webUrl = extractWebUrl(val);
    if (webUrl) {
      input.value = webUrl;
      info.style.display = 'block';
      info.style.color = 'var(--accent)';
      info.textContent = '芒聹聯 毛聰楼毛搂聛铆聛卢矛聴聬矛聞聹 URL 矛聻聬毛聫聶 矛露聰矛露聹: ' + webUrl;
    } else {
      info.style.display = 'block';
      info.style.color = 'var(--danger)';
      info.textContent = '芒聹聴 URL 矛露聰矛露聹 矛聥陇铆聦篓 - 矛搂聛矛聽聭 URL矛聺聞 矛聻聟毛聽楼铆聲麓矛拢录矛聞赂矛職聰';
    }
  } else {
    info.style.display = 'none';
  }
}

function extractWebUrl(url) {
  try {
    var fullUrl = url.indexOf('http') === 0 ? url : 'https://' + url;
    var u = new URL(fullUrl);
    var android = u.searchParams.get('af_android_url');
    var ios = u.searchParams.get('af_ios_url');
    var webUrl = android || ios;
    if (webUrl && webUrl.indexOf('community.mmtalk.kr') !== -1) return webUrl;
  } catch(e) {}
  if (url.indexOf('community.mmtalk.kr') !== -1) return url;
  return null;
}

function extractId(url) {
  var webUrl = extractWebUrl(url) || url;
  var m = webUrl.match(/article\/(\d+)/);
  if (m) return m[1];
  return null;
}

function runFull() {
  var url = document.getElementById('postUrl').value.trim();
  if (!url) { showStatus('analyzeStatus', 'URL矛聺聞 矛聻聟毛聽楼铆聲麓矛拢录矛聞赂矛職聰', 'error'); return; }
  geminiKey = geminiKey || document.getElementById('geminiKey').value.trim() || localStorage.getItem('kmama_gemini') || '';
  if (!geminiKey) { showStatus('analyzeStatus', 'Gemini API 铆聜陇毛楼录 毛篓录矛聽聙 矛聻聟毛聽楼铆聲麓矛拢录矛聞赂矛職聰', 'error'); return; }
  var articleId = extractId(url);
  if (!articleId) { showStatus('analyzeStatus', '矛聵卢毛掳聰毛楼赂 毛搂聢毛炉赂铆聠隆 URL矛聺聞 矛聻聟毛聽楼铆聲麓矛拢录矛聞赂矛職聰', 'error'); return; }
  setLoading(true, '锚虏聦矛聥聹锚赂聙 矛聢聵矛搂聭 矛陇聭...'); setProgress(1);
  document.getElementById('previewSection').style.display = 'none';
  fetchArticle(articleId).then(function(article) {
    if (!article) throw new Error('锚虏聦矛聥聹锚赂聙矛聺聞 矛掳戮矛聺聞 矛聢聵 矛聴聠矛聤碌毛聥聢毛聥陇');
    setProgress(2);
    setLoading(true, '毛虏聽矛聤陇铆聤赂 毛聦聯锚赂聙 矛聢聵矛搂聭 矛陇聭...');
    return fetchComments(articleId).then(function(comments) {
      setProgress(3);
      setLoading(true, 'Gemini AI 毛虏聢矛聴颅 矛陇聭...');
      return callGemini(article, comments).then(function(ai) {
        setProgress(4);
        renderAll(article, ai);
        document.getElementById('previewSection').style.display = 'block';
        document.getElementById('previewSection').scrollIntoView({ behavior: 'smooth' });
        showStatus('analyzeStatus', '芒聹聯 矛聶聞毛拢聦!', 'success');
      });
    });
  }).catch(function(e) {
    showStatus('analyzeStatus', '芒聹聴 ' + e.message, 'error');
  }).finally(function() {
    setLoading(false);
  });
}

function fetchArticle(id) {
  var targetUrl = 'https://community.mmtalk.kr/community/article/' + id;
  var proxies = [PROXY1 + encodeURIComponent(targetUrl), PROXY2 + encodeURIComponent(targetUrl)];
  var idx = 0;
  function tryNext(lastErr) {
    if (idx >= proxies.length) return Promise.reject(new Error('锚虏聦矛聥聹锚赂聙矛聺聞 锚掳聙矛聽赂矛聵卢 矛聢聵 矛聴聠矛聤碌毛聥聢毛聥陇: ' + lastErr));
    var proxyUrl = proxies[idx++];
    return fetch(proxyUrl).then(function(r) {
      if (!r.ok) return tryNext('HTTP ' + r.status);
      return r.text();
    }).then(function(html) {
      var doc = new DOMParser().parseFromString(html, 'text/html');
      var nd = doc.getElementById('__NEXT_DATA__');
      if (!nd) return tryNext('NEXT_DATA 矛聴聠矛聺聦');
      var article = JSON.parse(nd.textContent).props.pageProps.article;
      if (!article) return tryNext('锚虏聦矛聥聹锚赂聙 矛聽聲毛鲁麓 矛聴聠矛聺聦');
      return article;
    }).catch(function(e) { return tryNext(e.message); });
  }
  return tryNext('');
}

function fetchComments(id) {
  var headers = { 'Content-Type': 'application/json' };
  if (mmToken) headers['Authorization'] = 'Bearer ' + mmToken;
  return fetch(GQL, {
    method: 'POST',
    headers: headers,
    body: JSON.stringify({
      query: 'query GetComments($articleSeq:Float!){comments(articleSeq:$articleSeq){content likeCnt createTime}}',
      variables: { articleSeq: parseFloat(id) }
    })
  }).then(function(r) { return r.json(); }).then(function(data) {
    var list = (data && data.data && data.data.comments) || [];
    return list.sort(function(a,b){ return (b.likeCnt||0)-(a.likeCnt||0); }).slice(0,3);
  }).catch(function() { return []; });
}

function callGemini(article, comments) {
  var best = (comments[0] && comments[0].content) || '';
  var prompt = '铆聲聹锚碌颅 矛聹隆矛聲聞 矛禄陇毛庐陇毛聥聢铆聥掳 锚虏聦矛聥聹锚赂聙矛聺聞 矛聺录毛鲁赂 X(铆聤赂矛聹聞铆聞掳)矛職漏矛聹录毛隆聹 毛鲁聙铆聶聵铆聲麓矛拢录矛聞赂矛職聰.\n矛聽聹毛陋漏: ' + article.title + '\n矛隆掳铆職聦矛聢聵: ' + (article.viewCount||'') + '\n毛鲁赂毛卢赂: ' + article.content + '\n毛虏聽矛聤陇铆聤赂毛聦聯锚赂聙: ' + (best||'矛聴聠矛聺聦') + '\n\n锚路聹矛鹿聶: 锚掳聹矛聺赂 铆聤鹿矛聽聲 矛職聰矛聠聦(矛聺麓毛娄聞,矛搂聙矛聴颅,毛鲁聭矛聸聬毛陋聟) 矛聽聹锚卤掳. 矛聺聙矛聳麓毛聤聰 铆聭聹矛陇聙矛聳麓毛隆聹. 矛聻聬矛聴掳矛聤陇毛聼卢矛職麓 矛聺录毛鲁赂矛聳麓.\n\nJSON毛搂聦 矛聺聭毛聥碌(毛搂聢铆聛卢毛聥陇矛職麓 矛聴聠矛聺麓):\n{"ko_title":"锚掳聛矛聝聣毛聬聹 铆聲聹锚碌颅矛聳麓 矛聽聹毛陋漏","ko_body1":"铆聲聹锚碌颅矛聳麓 Cut1 毛鲁赂毛卢赂(200矛聻聬矛聺麓毛聜麓)","ko_body2":"铆聲聹锚碌颅矛聳麓 Cut2 毛鲁赂毛卢赂(200矛聻聬矛聺麓毛聜麓)","ko_body3":"铆聲聹锚碌颅矛聳麓 Cut3+毛搂聢毛卢麓毛娄卢(200矛聻聬矛聺麓毛聜麓)","ko_comment":"毛虏聽矛聤陇铆聤赂毛聦聯锚赂聙 铆聲聹锚碌颅矛聳麓(矛聴聠矛聹录毛漏麓 毛鹿聢毛卢赂矛聻聬矛聴麓)","jp_title":"矛聺录毛鲁赂矛聳麓 矛聽聹毛陋漏","jp_body1":"矛聺录毛鲁赂矛聳麓 Cut1(150矛聻聬矛聺麓毛聜麓)","jp_body2":"矛聺录毛鲁赂矛聳麓 Cut2(150矛聻聬矛聺麓毛聜麓)","jp_body3":"矛聺录毛鲁赂矛聳麓 Cut3(150矛聻聬矛聺麓毛聜麓)","jp_comment":"毛虏聽矛聤陇铆聤赂毛聦聯锚赂聙 矛聺录毛鲁赂矛聳麓","time_ko":"矛聻聭矛聞卤矛聥聹锚掳聞 铆聲聹锚碌颅矛聳麓","time_jp":"矛聻聭矛聞卤矛聥聹锚掳聞 矛聺录毛鲁赂矛聳麓(矛聵聢:14忙聶聜茅聳聯氓聣聧)","views":"' + (article.viewCount||'') + '","ko_tw1":"铆聲聹锚碌颅矛聳麓 锚鲁碌锚掳聬铆聵聲 铆聤赂矛聹聴(140矛聻聬,铆聲麓矛聥聹铆聝聹锚路赂铆聫卢铆聲篓)","ko_tw2":"铆聲聹锚碌颅矛聳麓 矛露漏锚虏漏铆聵聲 铆聤赂矛聹聴(140矛聻聬,铆聲麓矛聥聹铆聝聹锚路赂铆聫卢铆聲篓)","ko_tw3":"铆聲聹锚碌颅矛聳麓 矛搂聢毛卢赂铆聵聲 铆聤赂矛聹聴(140矛聻聬,铆聲麓矛聥聹铆聝聹锚路赂铆聫卢铆聲篓)","jp_tw1":"矛聺录毛鲁赂矛聳麓 锚鲁碌锚掳聬铆聵聲 铆聤赂矛聹聴(130矛聻聬,铆聲麓矛聥聹铆聝聹锚路赂铆聫卢铆聲篓)","jp_tw2":"矛聺录毛鲁赂矛聳麓 矛露漏锚虏漏铆聵聲 铆聤赂矛聹聴(130矛聻聬,铆聲麓矛聥聹铆聝聹锚路赂铆聫卢铆聲篓)","jp_tw3":"矛聺录毛鲁赂矛聳麓 矛搂聢毛卢赂铆聵聲 铆聤赂矛聹聴(130矛聻聬,铆聲麓矛聥聹铆聝聹锚路赂铆聫卢铆聲篓)"}';

  var models = ['gemini-2.5-flash'];
  var midx = 0;

  function tryModel(lastErr) {
    if (midx >= models.length) return Promise.reject(new Error('Gemini 矛聵陇毛楼聵: ' + lastErr));
    var model = models[midx++];
    return fetch('https://generativelanguage.googleapis.com/v1beta/models/' + model + ':generateContent?key=' + geminiKey, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { temperature: 0.7, maxOutputTokens: 2000 } })
    }).then(function(r) { return r.json(); }).then(function(data) {
      if (data.error) {
        var msg = data.error.message || '';
        if (msg.indexOf('quota') !== -1 || msg.indexOf('Quota') !== -1 || msg.indexOf('RESOURCE_EXHAUSTED') !== -1 || msg.indexOf('not found') !== -1) {
          return tryModel(msg);
        }
        throw new Error(msg);
      }
      var text = (data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0] && data.candidates[0].content.parts[0].text) || '';
      return JSON.parse(text.replace(/```json|```/g, '').trim());
    }).catch(function(e) {
      if (midx < models.length) return tryModel(e.message);
      throw e;
    });
  }
  return tryModel('');
}

function mkCard(lang, cut, title, time, views, showMeta, body, comment, showComment) {
  var jp = lang === 'jp';
  var name = jp ? '茅聼聯氓聸陆茫聝聻茫聝聻' : '铆聲聹锚碌颅毛搂聵';
  var html = '<div class="card-wrap"><div class="cut-label">Cut#' + cut + '</div><div class="post-card' + (jp ? ' jp' : '') + '">';
  html += '<div class="card-handle">@kmama_real</div>';
  html += '<div class="' + (cut===1 ? 'card-ttl-bold' : 'card-ttl-normal') + '">' + esc(title) + '</div>';
  if (showMeta) {
    html += '<div class="card-meta"><div class="card-avatar">冒聼聬禄</div><div>';
    html += '<div class="card-meta-name">' + name + '</div>';
    html += '<div class="card-meta-sub">' + esc(time) + ' 芒聙垄芒聙垄 ' + esc(String(views)) + '</div>';
    html += '</div></div>';
  }
  html += '<div class="card-body">' + esc(body) + '</div>';
  if (showComment && comment) {
    html += '<div class="best-wrap"><div class="best-lbl">冒聼聭聭 毛虏聽矛聤陇铆聤赂 毛聦聯锚赂聙</div><div class="best-txt">' + esc(comment) + '</div></div>';
  }
  html += '</div></div>';
  return html;
}

function mkRaw(lang, title, time, views, showMeta, body, comment, showComment) {
  var jp = lang === 'jp';
  var name = jp ? '茅聼聯氓聸陆茫聝聻茫聝聻' : '铆聲聹锚碌颅毛搂聵';

  html += '<div style="font-size:11px;font-weight:700;text-align:center;color:#555;margin-bottom:14px">@kmama_real</div>';
  html += '<div style="font-size:14px;font-weight:600;color:#111;margin-bottom:12px;line-height:1.5">' + esc(title) + '</div>';

    html += '<div style="display:flex;align-items:center;gap:8px;padding-bottom:12px;border-bottom:1px solid #eee;margin-bottom:12px">';

function twH(t, style) {
  var text = t || '';
  return '<div class="tweet-item"><div class="tweet-style">' + style + '</div><div class="tweet-text">' + esc(text) + '</div><div class="tweet-copy"><button class="copy-btn" onclick="copyT(this)" data-text="' + esc(text) + '">毛鲁碌矛聜卢</button></div></div>';
}

function copyT(btn) {
  var text = btn.getAttribute('data-text');
  navigator.clipboard.writeText(text).then(function() {
    document.getElementById('dlStatus').textContent = '芒聹聯 毛鲁碌矛聜卢毛聬篓!';
    setTimeout(function(){ document.getElementById('dlStatus').textContent = ''; }, 2000);
  });
}

function downloadCards(lang) {
  document.getElementById('dlStatus').textContent = '矛聺麓毛炉赂矛搂聙 矛聝聺矛聞卤 矛陇聭...';
  var el = document.getElementById(lang === 'ko' ? 'koCardsEl' : 'jpCardsEl');
  html2canvas(el, { scale: 2, backgroundColor: '#f5f5f0', useCORS: true, logging: false }).then(function(canvas) {
    var a = document.createElement('a');
    a.download = 'kmama_' + lang + '_' + Date.now() + '.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
    document.getElementById('dlStatus').textContent = '芒聹聯 毛聥陇矛職麓毛隆聹毛聯聹 矛聶聞毛拢聦!';
  }).catch(function(e) {
    document.getElementById('dlStatus').textContent = '芒聹聴 ' + e.message;
  });
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showStatus(id, msg, type, loading) {
  var el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = '<div class="status-bar ' + type + '">' + (loading ? '<div class="dot"></div>' : '') + msg + '</div>';
}

function setLoading(show, msg) {
  document.getElementById('loadingOverlay').classList.toggle('show', show);
  if (msg) document.getElementById('loadingMsg').textContent = msg;
}

function setProgress(step) {
  for (var i = 1; i <= 4; i++) {
    var el = document.getElementById('prog' + i);
    if (el) el.className = 'prog-step' + (i < step ? ' done' : i === step ? ' active' : '');
  }
}

window.onload = function() {
  var k = localStorage.getItem('kmama_gemini');
  if (k) { document.getElementById('geminiKey').value = k; geminiKey = k; }
  var p = localStorage.getItem('kmama_phone');
  if (p) document.getElementById('mmPhone').value = p;
};
